name: mathgod
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_math_fork: ^0.7.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  http: ^1.1.0
  device_info_plus: ^9.1.0
  ffi: ^2.1.2
  url_launcher: ^6.2.5
  fl_chart: ^0.66.0
  math_expressions: ^2.3.1
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Added for icon generation
  flutter_launcher_icons: ^0.13.1

# Configuration for the App Logo
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/mathgod_logo.png"
  # This makes the icon look good on modern Android devices
  adaptive_icon_background: "#121212" # Dark background to match a math theme
  adaptive_icon_foreground: "assets/mathgod_logo.png"

flutter:
  uses-material-design: true
  # Added to register your image assets
  assets:
    - assets/mathgod_logo.png
    - assets/mathgod_logo.svg