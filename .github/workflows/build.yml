name: Build Math God APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐧 Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: 📱 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: 📦 Install dependencies
      run: flutter pub get
    
    - name: 🔧 Build APK (Release)
      run: flutter build apk --release

    - name: 🏷️ Generate release tag
      id: tag
      run: echo "tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: 🚀 Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "MathGod APK – ${{ steps.tag.outputs.tag }}"
        files: build/app/outputs/flutter-apk/app-release.apk
        body: |
          ## Math God APK
          
          - **Build Date:** ${{ steps.tag.outputs.tag }}
          - **Commit:** ${{ github.sha }}
          - **Branch:** ${{ github.ref_name }}
          
          ### Installation
          1. Download the APK below
          2. Enable "Install from unknown sources" on your Android device
          3. Install and activate with your license key
          
          ### Need help?
          Contact: mathgodsupport@gmail.com
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}